server.port=${PORT:8080}
spring.application.name=backend

# ==========================================
# 1. SUPABASE POSTGRESQL CONFIGURATION
# ==========================================
# Using the exact JDBC URL from your Supabase Dashboard
spring.datasource.url=jdbc:postgresql://db.iqembbwuktdfffmbbtjw.supabase.co:5432/postgres?sslmode=require

# For the Pooler, the username MUST include the Project ID
spring.datasource.username=postgres
# This variable is pulled from your Render Environment Variables
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# HikariCP Settings - This identifies your "Tenant" to the Supabase Gatekeeper
spring.datasource.hikari.dataSourceProperties.sslmode=require
# spring.datasource.hikari.dataSourceProperties.options=-c project=iqembbwuktdfffmbbtjw

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# ==========================================
# 2. JWT Configuration
# ==========================================
jwt.secret=styora-super-secret-key-that-is-at-least-64-characters-long-for-hs512-algorithm
jwt.expiration=86400000

# ==========================================
# 3. Razorpay Configuration (TEST KEYS)
# ==========================================
razorpay.key.id=rzp_test_StyoraDevKey
razorpay.key.secret=StyoraSecretDevKey

# ==========================================
# 4. Gemini AI Configuration
# ==========================================
gemini.api.key=${GEMINI_API_KEY}
