spring.application.name=backend
# H2 Console settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database connection settings
spring.datasource.url=jdbc:h2:mem:styora-db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
# A long, random secret string used to sign tokens. Keep this PRIVATE.
jwt.secret=styora-super-secret-key-that-is-at-least-64-characters-long-for-hs512-algorithm
# Token validity: 86400000 ms = 24 hours
jwt.expiration=86400000

# Razorpay Configuration (TEST KEYS)
razorpay.key.id=rzp_test_StyoraDevKey
razorpay.key.secret=StyoraSecretDevKey

# Gemini AI Configuration
gemini.api.key=