server.port=${PORT:8080}
spring.application.name=backend

# ==========================================
# 1. SUPABASE POSTGRESQL CONFIGURATION
# ==========================================
# Replace the bracketed text with your actual Supabase credentials
spring.datasource.url=jdbc:postgresql://aws-0-ap-south-1.pooler.supabase.com:6543/postgres
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.properties.hibernate.hikari.dataSourceProperties.options=-c search_path=public -c project=iqembbwuktdfffmbbtjw
# Hibernate settings for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# ==========================================
# 2. JWT Configuration
# ==========================================
jwt.secret=styora-super-secret-key-that-is-at-least-64-characters-long-for-hs512-algorithm
jwt.expiration=86400000

# ==========================================
# 3. Razorpay Configuration (TEST KEYS)
# ==========================================
razorpay.key.id=rzp_test_StyoraDevKey
razorpay.key.secret=StyoraSecretDevKey

# ==========================================
# 4. Gemini AI Configuration
# ==========================================
# Tell Spring to look for an Environment Variable on Render
gemini.api.key=${GEMINI_API_KEY}