server.port=${PORT:8080}
spring.application.name=backend

# ==========================================
# 1. SUPABASE POSTGRESQL CONFIGURATION
# ==========================================
# We are using the Direct IPv4 address to bypass the picky tenant identifier.
spring.datasource.url=jdbc:postgresql://db.iqembbwuktdfffmbbtjw.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# HikariCP settings for a stable connection
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# Hibernate settings for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# ==========================================
# 2. JWT Configuration
# ==========================================
jwt.secret=styora-super-secret-key-that-is-at-least-64-characters-long-for-hs512-algorithm
jwt.expiration=86400000

# ==========================================
# 3. Razorpay Configuration (TEST KEYS)
# ==========================================
razorpay.key.id=rzp_test_StyoraDevKey
razorpay.key.secret=StyoraSecretDevKey

# ==========================================
# 4. Gemini AI Configuration
# ==========================================
gemini.api.key=${GEMINI_API_KEY}