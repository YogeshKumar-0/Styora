<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Styora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { border: none; border-radius: 1rem; }
        .brand-logo { font-size: 1.75rem; font-weight: 700; text-decoration: none; color: #333; }
        .brand-logo i { color: var(--bs-primary); }
    </style>
</head>
<body>
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="card shadow-lg login-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                             <a class="brand-logo" href="index.html"><i class="fa-solid fa-store me-2"></i><strong>Styora</strong></a>
                            <h3 class="mt-3">Login to Your Account</h3>
                            <p class="text-muted">Welcome back! Please enter your details.</p>
                        </div>
                        
                        <div id="message" class="mb-3"></div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required minlength="8" 
                                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                        title="Must be at least 8 characters long and contain at least one number, one uppercase, and one lowercase letter.">
                                    <span class="input-group-text" id="togglePassword" style="cursor: pointer;">
                                        <i class="fa-solid fa-eye" id="password-icon"></i>
                                    </span>
                                </div>
                            </div>
                            <div class="d-flex flex-column flex-sm-row justify-content-sm-between align-items-sm-center mb-4">
                                <div class="form-check mb-2 mb-sm-0">
                                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">
                                        Remember me
                                    </label>
                                </div>
                                <a href="#" class="text-decoration-none">Forgot password?</a>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Login</button>
                            </div>
                        </form>
                        <div class="text-center mt-4">
                            <p class="text-muted">Don't have an account? <a href="signup.html" class="fw-bold text-decoration-none">Sign Up</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/login.js"></script> <script src="assets/js/password-toggle.js"></script>
</body>
</html>
